
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KTU.Vibes · Register</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="css/home_style.css" />
  <link rel="stylesheet" href="css/register_style.css" />
</head>
<body>
  <div class="app-wrapper" style="max-width:520px; margin:40px auto;">
    <div class="register-container">
      <div style="text-align:center; margin-bottom:24px;">
        <img src="https://ktu.edu.gh/wp-content/uploads/2025/06/ktu_logo1.png" alt="KTU Logo" style="height:64px; margin:0 auto 8px; display:block;" />
        <h2 style="font-weight:700;">Create account</h2>
        <p style="color:#64748b;">Join the KTU.Vibes community</p>
      </div>
      <form onsubmit="event.preventDefault(); window.location.href='home.html';">
        <div class="form-group"><input type="text" placeholder="Full name" required /></div>
        <div class="form-group"><input type="email" placeholder="Email address" required /></div>
        <div class="form-group"><input type="password" placeholder="Password" required /></div>
        <div class="form-group"><input type="password" placeholder="Confirm password" required /></div>
        <button class="login-btn" style="width:100%; background:#00008b; color:white; border:none; padding:14px; border-radius:40px; font-weight:600; font-size:16px;"><i class="fas fa-user-plus"></i> Register</button>
        <div style="text-align:center; margin-top:16px; font-size:14px; color:#64748b;">
          Already have an account? <a href="Login.html" style="color:#00008b; font-weight:500;">Login</a>
        </div>
      </form>
    </div>
    <div class="footer-note" style="justify-content:center;"><span><i class="far fa-copyright"></i> 2026 KTU.Vibes</span></div>
  </div>
  <script src="js/script.js"></script>
</body>
</html>
